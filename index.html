<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dyslexia Typing Simulation Pro</title>
  <style>
    :root {
      --neon-cyan: #00e5ff;
      --neon-magenta: #ff0055;
      --neon-orange: #ffa502;
      --bg-dark: #09090d;
      --panel-dark: #14141f;
      --border-color: #242435;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-dark); 
      color: #e2e8f0; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start; 
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    .config-header {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 480px;
      gap: 10px;
      margin-bottom: 15px;
    }

    .lang-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .lang-btn {
      flex: 1;
      background-color: var(--panel-dark);
      color: #718096;
      border: 1px solid var(--border-color);
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.85em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .lang-btn.active {
      background-color: #1e1e30;
      color: var(--neon-cyan);
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
    }
    
    #game-container {
      position: relative;
      background: var(--panel-dark); 
      padding: 35px 25px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 229, 255, 0.02);
      border: 1px solid var(--border-color);
      text-align: center;
      width: 100%;
      max-width: 480px; 
      box-sizing: border-box;
    }

    #stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
      font-weight: 700;
      color: #a0aec0;
      font-size: 1.05em;
      letter-spacing: 0.5px;
    }
    #score-val, #dynamic-stat-val {
      color: var(--neon-cyan); 
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
    }

    #combo-badge {
      font-size: 0.8em;
      background: rgba(255, 0, 85, 0.1);
      color: var(--neon-magenta);
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid rgba(255, 0, 85, 0.2);
      opacity: 0;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-weight: bold;
    }
    #combo-badge.active { opacity: 1; }
    
    #word-wrapper {
      position: relative;
      width: 100%;
      margin: 30px 0;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #word-display {
      font-size: clamp(1.8em, 8vw, 2.8em); 
      letter-spacing: 5px;
      font-family: 'Courier New', Courier, monospace; 
      color: #ffffff;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
      word-break: break-all;
      max-width: 100%;
      transition: filter 0.1s ease;
    }

    .dyslexia-mild {
      animation: micro-jitter 0.4s infinite alternate;
    }
    .dyslexia-hard {
      animation: macro-glitch 0.2s infinite;
      filter: blur(1px);
    }

    @keyframes micro-jitter {
      0% { transform: translate(0, 0); }
      100% { transform: translate(1px, -0.5px); }
    }
    @keyframes macro-glitch {
      0% { transform: translate(0, 0); text-shadow: 1px 0 var(--neon-magenta), -1px 0 var(--neon-cyan); }
      25% { transform: translate(-1.5px, 1px); }
      50% { transform: translate(1.5px, -1px); text-shadow: -1.5px 0 var(--neon-magenta), 1.5px 0 var(--neon-cyan); }
      75% { transform: translate(-0.5px, -0.5px); }
      100% { transform: translate(0, 0); }
    }
    
    input {
      font-size: 1.25em;
      padding: 14px;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      background-color: #1a1a26;
      color: #ffffff;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      outline: none;
      transition: all 0.25s ease;
      text-transform: uppercase; 
      font-weight: 600;
      letter-spacing: 1px;
    }
    input:focus { 
      border-color: var(--neon-cyan); 
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
      background-color: #1f1f30;
    }
    input::placeholder { color: #4a5568; font-size: 0.85em; text-transform: none; font-weight: normal; }
    
    #timer-container {
      width: 100%;
      height: 10px;
      background-color: #1a1a26;
      border-radius: 10px;
      margin-top: 30px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.02);
    }
    #timer-bar {
      height: 100%;
      width: 100%;
      background-color: var(--neon-cyan);
      transition: width 0.05s linear, background-color 0.3s ease;
    }
    
    #message {
      margin-top: 20px;
      font-size: 1.1em;
      color: var(--neon-magenta);
      font-weight: bold;
      min-height: 25px;
      white-space: pre-line; 
    }

    #leaderboard-container {
      margin-top: 30px;
      background: #0d0d14;
      border-radius: 14px;
      padding: 20px;
      text-align: left;
      border: 1px solid var(--border-color);
    }
    #leaderboard-title {
      color: var(--neon-cyan);
      text-align: center;
      margin: 0 0 15px 0;
      font-size: 1em;
      letter-spacing: 2.5px;
      font-weight: 800;
    }
    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #1a1a26;
      color: #cbd5e0;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.05em;
    }
    .leaderboard-item:last-child { border-bottom: none; }
    .leaderboard-name { font-weight: bold; color: #fff; }
    .leaderboard-score { color: var(--neon-orange); font-weight: bold; }

    #fx-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="config-header">
    <div class="lang-row">
      <button id="lang-cat" class="lang-btn" onclick="switchLanguage('CAT')"><span>📬</span> CATALÀ</button>
      <button id="lang-eng" class="lang-btn active" onclick="switchLanguage('ENG')"><span>🇬🇧</span> ENGLISH</button>
      <button id="lang-esp" class="lang-btn" onclick="switchLanguage('ESP')"><span>🇪🇸</span> ESPAÑOL</button>
    </div>
  </div>

  <div id="game-container">
    <canvas id="fx-canvas"></canvas>
    
    <div id="stats">
      <span>Score: <span id="score-val">0</span> <span id="combo-badge">X1</span></span>
      <span id="stat-label">Dyslexia: <span id="dynamic-stat-val">0%</span></span>
    </div>
    
    <div id="word-wrapper">
      <div id="word-display">LOADING...</div>
    </div>
    
    <input type="text" id="input-box" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
    
    <div id="timer-container">
      <div id="timer-bar"></div>
    </div>
    
    <div id="message"></div>

    <div id="leaderboard-container">
      <h3 id="leaderboard-title">🏆 HALL OF FAME</h3>
      <div id="leaderboard-list">Loading official ranking...</div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwWCBM2QrHZLBvNniXxPxyYQKzlkkXMoAQ0uYhD_zX80eAnPfJY7ToDwQMHJkGmM5av/exec";

    const dictionaries = {
      CAT: ["ordinador", "programacio", "javascript", "desenvolupador", "aplicacio", "tecnologia", "algoritme", "pantalla", "teclat", "internet", "connexio", "servidor", "variable", "funcio", "dislexia", "navegador", "seguretat", "informacio", "sistema", "memoria", "maquinari", "programari", "interficie", "usuari", "contrasenya", "monitor", "ratoli", "projecte", "versio", "objecte", "tauleta", "mobil", "pixel", "disseny", "nuvol", "dades", "fitxer"],
      ESP: ["pantalla", "teclado", "internet", "servidor", "variable", "funcion", "dislexia", "sistema", "memoria", "hardware", "usuario", "monitor", "raton", "proyecto", "version", "objeto", "tableta", "movil", "pixel", "diseno", "nube", "datos", "archivo", "galaxia", "universo", "planeta", "energia"],
      ENG: ["computer", "programming", "developer", "application", "technology", "algorithm", "screen", "keyboard", "internet", "server", "variable", "function", "dyslexia", "browser", "security", "information", "system", "memory", "hardware", "software", "interface", "user", "password"]
    };

    const similarLetters = {
      'b': ['d', 'p', 'q'], 'd': ['b', 'p', 'q'], 'p': ['q', 'b', 'd'], 'q': ['p', 'b', 'd'],
      'm': ['n', 'w'], 'n': ['m', 'u'], 'u': ['v', 'n'], 'v': ['u'],
      'l': ['i', '1', 'I'], 'i': ['l', 'j'], 't': ['f', 'l'], 'f': ['t'],
      'e': ['c', 'o', 'a'], 'c': ['e', 'o'], 'o': ['e', 'c', 'a'], 'a': ['e', 'o']
    };

    let currentLang = "ENG"; 
    let gameState = "PLAYING"; 
    let currentWord = "";
    let score = 0;
    let wordsCorrect = 0; 
    let streak = 0; 
    
    let dyslexiaChance = 0; 
    let initialTime = 12000; 
    let maxTime = initialTime; 
    let timeLeft = maxTime;
    let timerInterval;
    let wordStartTime = 0; 
    let dyslexiaInterval;
    let isTimerRunning = false; 

    let audioCtx = null;
    let wordDisplay, inputBox, timerBar, scoreDisplay, statLabel, messageDisplay, leaderboardList, canvas, ctx;
    let particles = [];

    function resizeCanvas() {
      if (canvas) {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
      }
    }

    function playSound(type) {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'success') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(440, now);
          osc.frequency.exponentialRampToValueAtTime(880, now + 0.12);
          gain.gain.setValueAtTime(0.2, now);
          gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
          osc.start(now);
          osc.stop(now + 0.15);
        } else if (type === 'break') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(290, now);
          osc.frequency.linearRampToValueAtTime(120, now + 0.2);
          gain.gain.setValueAtTime(0.25, now);
          gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
          osc.start(now);
          osc.stop(now + 0.2);
        } else if (type === 'gameover') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(180, now);
          osc.frequency.linearRampToValueAtTime(60, now + 0.6);
          gain.gain.setValueAtTime(0.4, now);
          gain.gain.linearRampToValueAtTime(0.01, now + 0.6);
          osc.start(now);
          osc.stop(now + 0.6);
        }
      } catch (e) {
        console.log("Audio issue.");
      }
    }

    class ConfettiParticle {
      constructor(x, y, customColor, isCelebration = false) {
        this.x = x;
        this.y = y;
        const speedMultiplier = isCelebration ? 10 : 5;
        this.size = Math.random() * (isCelebration ? 6 : 4) + 2;
        this.speedX = (Math.random() - 0.5) * speedMultiplier;
        this.speedY = (Math.random() - 0.6) * speedMultiplier; 
        this.gravity = 0.15; 
        
        if (customColor) {
          this.color = customColor;
        } else {
          const colors = ['#00e5ff', '#ff0055', '#ffa502', '#00ff66', '#ffff00'];
          this.color = colors[Math.floor(Math.random() * colors.length)];
        }
        this.alpha = 1;
        this.rotation = Math.random() * Math.PI;
        this.rotationSpeed = (Math.random() - 0.5) * 0.2;
      }
      update() {
        this.speedY += this.gravity; 
        this.x += this.speedX;
        this.y += this.speedY;
        this.rotation += this.rotationSpeed;
        this.alpha -= 0.015; 
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
        ctx.restore();
      }
    }

    function triggerExplosion(color, isCelebration = false) {
      const wrapper = document.getElementById('word-wrapper');
      const x = wrapper.offsetLeft + (wrapper.offsetWidth / 2);
      const y = wrapper.offsetTop + (wrapper.offsetHeight / 2);
      
      const count = isCelebration ? 55 : 25;
      for (let i = 0; i < count; i++) {
        particles.push(new ConfettiParticle(x, y, color, isCelebration));
      }
    }

    function animateFX() {
      if (!ctx) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.alpha > 0);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animateFX);
    }

    function cleanWord(word) {
      return word.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/·/g, "");
    }

    function switchLanguage(lang) {
      if (gameState === "NAME_INPUT" || gameState === "WAITING_RESTART") return;
      currentLang = lang;
      document.getElementById('lang-cat').classList.toggle('active', lang === 'CAT');
      document.getElementById('lang-eng').classList.toggle('active', lang === 'ENG');
      document.getElementById('lang-esp').classList.toggle('active', lang === 'ESP');
      initGame();
    }

    function scrambleWordSpeed(word, chance) {
      if (word.length <= 3 || chance === 0) return word; 
      let chars = word.split('');
      for (let i = 1; i < chars.length - 1; i++) {
        if (Math.random() < chance) {
          let charLower = chars[i].toLowerCase();
          if (similarLetters[charLower]) {
            chars[i] = similarLetters[charLower][Math.floor(Math.random() * similarLetters[charLower].length)];
          }
        }
      }
      if (chance > 0.25) {
        let mixChance = (chance - 0.25) * 0.4;
        for (let i = 1; i < chars.length - 2; i++) {
          if (Math.random() < mixChance) {
            let temp = chars[i]; chars[i] = chars[i + 1]; chars[i + 1] = temp;
            i++; 
          }
        }
      }
      return chars.join('');
    }

    function startDyslexiaLoop() {
      clearInterval(dyslexiaInterval);
      dyslexiaInterval = setInterval(() => {
        if (gameState !== "PLAYING") return;
        
        wordDisplay.className = "";
        if (dyslexiaChance > 0.35) {
          wordDisplay.classList.add('dyslexia-hard');
        } else if (dyslexiaChance > 0.15) {
          wordDisplay.classList.add('dyslexia-mild');
        }

        if (dyslexiaChance > 0) {
          wordDisplay.innerText = scrambleWordSpeed(currentWord, dyslexiaChance).toUpperCase();
        } else {
          wordDisplay.innerText = currentWord.toUpperCase();
        }
      }, 140); 
    }

    function calculateScorePoints() {
      let timeElapsed = Date.now() - wordStartTime;
      let basePoints = 100 - Math.floor(timeElapsed / 60); 
      if (basePoints > 100) basePoints = 100;
      if (basePoints < 30) basePoints = 30; 
      
      let multiplier = 1;
      if (streak >= 9) multiplier = 3;
      else if (streak >= 4) multiplier = 2;
      
      return basePoints * multiplier;
    }

    function updateComboUI() {
      const badge = document.getElementById('combo-badge');
      if (streak >= 9) {
        badge.innerText = `X3 COMBO`;
        badge.className = "active";
        badge.style.color = "var(--neon-orange)";
        badge.style.background = "rgba(255, 165, 2, 0.1)";
        badge.style.transform = "scale(1.25)";
      } else if (streak >= 4) {
        badge.innerText = `X2 COMBO`;
        badge.className = "active";
        badge.style.color = "var(--neon-cyan)";
        badge.style.background = "rgba(0, 229, 255, 0.1)";
        badge.style.transform = "scale(1.1)";
      } else {
        badge.className = "";
        badge.style.transform = "scale(1)";
      }
    }

    function startTimer() {
      clearInterval(timerInterval);
      isTimerRunning = true;
      timerInterval = setInterval(() => {
        timeLeft -= 50;
        let percentage = (timeLeft / maxTime) * 100;
        timerBar.style.width = percentage + "%";
        if (percentage < 30) timerBar.style.backgroundColor = "var(--neon-magenta)"; 
        else if (percentage < 60) timerBar.style.backgroundColor = "var(--neon-orange)"; 
        else timerBar.style.backgroundColor = "var(--neon-cyan)"; 
        if (timeLeft <= 0) gameOver();
      }, 50);
    }

    function nextWord() {
      let langDict = dictionaries[currentLang];
      let rawWord = langDict[Math.floor(Math.random() * langDict.length)];
      currentWord = cleanWord(rawWord).toLowerCase(); 
      inputBox.value = "";
      maxTime = Math.max(3500, initialTime - (wordsCorrect * 250)); 
      timeLeft = maxTime;
      
      if (wordsCorrect === 0) dyslexiaChance = 0;
      else dyslexiaChance = Math.min(0.55, Math.sqrt(wordsCorrect) * 0.05); 
      
      document.getElementById('dynamic-stat-val').innerText = `${Math.round(dyslexiaChance * 100)}%`;
      startDyslexiaLoop();
      
      if (wordsCorrect === 0) {
        isTimerRunning = false;
        clearInterval(timerInterval);
        timerBar.style.width = "100%";
        timerBar.style.backgroundColor = "var(--neon-cyan)";
      } else {
        wordStartTime = Date.now();
        startTimer();
      }
    }

    function setupInputListeners() {
      // CAPTURA ÚNICA DEL BACKSPACE (Punt clau de la mecànica de pifia)
      inputBox.addEventListener('keydown', (e) => {
        if (gameState !== "PLAYING") return;

        // LA REGLA D'OR: Només penalitzem si borra l'usuari!
        if (e.key === "Backspace") {
          if (streak >= 4) {
            messageDisplay.style.color = "var(--neon-magenta)";
            messageDisplay.innerText = "Combo broken! Backspace penalty.";
            triggerExplosion("var(--neon-magenta)", false); 
            playSound('break'); 
          }
          streak = 0;
          updateComboUI();
        }

        if (e.key === 'Enter') {
          if (gameState === "NAME_INPUT") submitScoreArcade();
          else if (gameState === "WAITING_RESTART") initGame();
        }
      });

      inputBox.addEventListener('input', (e) => {
        if (gameState !== "PLAYING") return;

        let typedValue = e.target.value.toLowerCase();

        if (wordsCorrect === 0 && !isTimerRunning && typedValue.length > 0) {
          wordStartTime = Date.now();
          startTimer();
        }

        // NOTA: S'ha eliminat el tall de combo per escriure malament.
        // Ara el jugador pot seguir cometent errors en silenci sense cap xof instantani.

        // ENCERT DE PARAULA SENCERA
        if (typedValue.trim() === currentWord) {
          wordsCorrect++;
          streak++;
          
          triggerExplosion(null, true); 
          playSound('success'); 
          
          let pointsGained = calculateScorePoints();
          score += pointsGained;
          scoreDisplay.innerText = score;
          
          updateComboUI();
          
          messageDisplay.style.color = "var(--neon-cyan)";
          messageDisplay.innerText = streak >= 4 ? `+${pointsGained} Combo multiplier!` : `+${pointsGained}`;
          
          nextWord();
        }
      });
    }

    async function submitScoreArcade() {
      let playerName = inputBox.value.trim().toUpperCase();
      if (playerName.length === 0) playerName = "AAA"; 
      else if (playerName.length < 3) playerName = playerName.padEnd(3, 'X'); 
      inputBox.disabled = true;
      inputBox.value = "";
      inputBox.placeholder = "Saving to cryptographic cloud...";
      
      if (API_URL) {
        try {
          let response = await fetch(API_URL, {
            method: 'POST',
            mode: 'cors',
            body: JSON.stringify({ playerName: playerName, score: score, lang: currentLang })
          });
          let newLeaderboard = await response.json();
          renderLeaderboard(newLeaderboard);
        } catch(e) {
          console.error("Error saving leaderboard:", e);
        }
      }
      setupWaitingRestart();
    }

    async function fetchLeaderboard() {
      if (!API_URL) {
        leaderboardList.innerHTML = "<div style='color: #4a5568;'>Database offline (Local fallback)</div>";
        return;
      }
      try {
        let response = await fetch(API_URL);
        let data = await response.json();
        renderLeaderboard(data);
      } catch (e) {
        leaderboardList.innerHTML = "<div style='color: #4a5568;'>Error sync with cloud database</div>";
      }
    }

    function setupWaitingRestart() {
      gameState = "WAITING_RESTART";
      inputBox.disabled = false;
      inputBox.maxLength = 100; 
      inputBox.placeholder = "Press ENTER to restart simulation";
      inputBox.focus();
    }

    function gameOver() {
      gameState = "NAME_INPUT";
      clearInterval(timerInterval);
      clearInterval(dyslexiaInterval);
      streak = 0;
      updateComboUI();
      
      playSound('gameover'); 
      
      wordDisplay.className = "";
      wordDisplay.style.color = "var(--neon-magenta)";
      wordDisplay.innerText = "SIMULATION TERMINATED";
      messageDisplay.style.color = "var(--neon-orange)";
      messageDisplay.innerText = `Expected input: ${currentWord.toUpperCase()}`;
      
      inputBox.value = "";
      inputBox.maxLength = 3; 
      inputBox.placeholder = "Type 3 arcade initials + ENTER";
      inputBox.focus();
      timerBar.style.width = "0%";
    }

    function renderLeaderboard(data) {
      if (!data || data.length === 0) {
        leaderboardList.innerHTML = "<div style='color: #4a5568;'>No test records found</div>";
        return;
      }
      let html = "";
      data.forEach((item, index) => {
        html += `<div class="leaderboard-item">
                  <span class="leaderboard-name">${index + 1}. ${item.name}</span>
                  <span class="leaderboard-score">${item.score}</span>
                 </div>`;
      });
      leaderboardList.innerHTML = html;
    }

    function initGame() {
      gameState = "PLAYING";
      score = 0;
      wordsCorrect = 0;
      dyslexiaChance = 0;
      streak = 0;
      isTimerRunning = false;
      
      if(scoreDisplay) scoreDisplay.innerText = score;
      if(messageDisplay) messageDisplay.innerText = "";
      if(wordDisplay) {
        wordDisplay.style.color = "#ffffff";
        wordDisplay.className = "";
      }
      updateComboUI();
      
      if(inputBox) {
        inputBox.value = "";
        inputBox.disabled = false;
        inputBox.maxLength = 100; 
        inputBox.placeholder = "Type the word to calibrate...";
        inputBox.focus(); 
      }
      
      if(timerBar) {
        timerBar.style.width = "100%";
        timerBar.style.backgroundColor = "var(--neon-cyan)";
      }
      
      resizeCanvas();
      nextWord();
    }

    window.onload = function() {
      wordDisplay = document.getElementById('word-display');
      inputBox = document.getElementById('input-box');
      timerBar = document.getElementById('timer-bar');
      scoreDisplay = document.getElementById('score-val');
      statLabel = document.getElementById('stat-label');
      messageDisplay = document.getElementById('message');
      leaderboardList = document.getElementById('leaderboard-list');
      canvas = document.getElementById('fx-canvas');
      ctx = canvas.getContext('2d');

      setupInputListeners();
      resizeCanvas();
      animateFX();
      fetchLeaderboard();
      initGame();
    };
    
    window.onresize = resizeCanvas;
  </script>
</body>
</html>
